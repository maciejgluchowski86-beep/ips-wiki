site_name: IPS Wiki
site_description: Wiki for interacting particle systems, spin systems, ergodicity, and related research.
site_author: Maciej Głuchowski
repo_url: https://github.com/maciejgluchowski86-beep/ips-wiki
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Core entries:
      - Lattice and graph: entries/lattice-and-graph.md
      - Polynomial-growth lattice: entries/polynomial-growth-lattice.md
      - Local functions: entries/local-functions.md
      - Monomials: entries/monomials.md
      - Interacting particle system: entries/interacting-particle-system.md
      - Spin system: entries/spin-system.md
      - Oriented spin system: entries/oriented-spin-system.md
      - Ergodicity: entries/ergodicity.md
  - Duality:
      - Duality: entries/duality.md
      - Theta monomials: entries/theta-monomials.md
      - Monomial duality for spin systems: entries/monomial-duality-for-spin-systems.md
      - Patch factorization: entries/patch-factorization.md
      - Patch contribution: entries/patch-contribution.md
      - Patch representation of spin systems: entries/patch-representation-of-spin-systems.md
      - Duality noise lemma: entries/duality-noise-lemma.md
  - Signed additive set processes:
      - Signed additive set process: entries/signed-additive-set-process.md
      - Graphical construction of signed additive set process: entries/graphical-construction-of-signed-additive-set-process.md
      - Successful interaction: entries/successful-interaction.md
      - Patch: entries/patch.md
      - Patch consistency event: entries/patch-consistency-event.md
  - KCSM:
      - Bernoulli refresh operator: entries/bernoulli-refresh-operator.md
      - Update family: entries/update-family.md
      - Kinetically constrained spin model: entries/kinetically-constrained-spin-model.md
      - Soft KCSM: entries/soft-kcsm.md
      - Legal update: entries/legal-update.md
      - Monomial duality for FA-1f: entries/monomial-duality-for-fa-1f.md
      - KCSM relaxation and mixing: entries/kcsm-relaxation-and-mixing.md
      - KCSM out of equilibrium: entries/kcsm-out-of-equilibrium.md
  - Models:
      - FA-1f model: entries/fa-1f-model.md
      - East model: entries/east-model.md
  - Out of equilibrium:
      - FA-1f out of equilibrium: entries/fa-1f-out-of-equilibrium.md
      - East out of equilibrium: entries/east-out-of-equilibrium.md
  - Meta:
      - Notation: meta/notation.md
      - Style decisions: meta/style-decisions.md
      - Entry template: meta/entry-template.md
      - References: meta/references.md

markdown_extensions:
  - meta
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js