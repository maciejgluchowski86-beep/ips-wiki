name: Build wiki site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lint wiki source
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          paths = list(Path("docs").rglob("*.md")) + [Path("README.md"), Path("project-state.md")]
          failures = []

          subset_pattern = re.compile(r"\\subset(?!eq|neq)")
          subset_allowed = {Path("docs/meta/notation.md")}

          for path in paths:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              for line_no, line in enumerate(text.splitlines(), start=1):
                  for col, ch in enumerate(line, start=1):
                      code = ord(ch)
                      if code < 32 and ch not in "\t":
                          failures.append(
                              f"{path}:{line_no}:{col}: forbidden control character U+{code:04X}"
                          )
                  if path not in subset_allowed and subset_pattern.search(line):
                      failures.append(
                          f"{path}:{line_no}: forbidden ambiguous subset notation; use subseteq, subsetneq, or Subset"
                      )

          if failures:
              print("Wiki source lint failed:")
              print("\n".join(failures))
              raise SystemExit(1)
          PY

      - name: Build site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
