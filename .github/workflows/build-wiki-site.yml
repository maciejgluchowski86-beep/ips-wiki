name: Build wiki site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check subset notation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          pattern = re.compile(r"\\subset(?!eq|neq)")
          paths = list(Path("docs").rglob("*.md")) + [Path("README.md"), Path("project-state.md")]
          failures = []
          for path in paths:
              if not path.exists():
                  continue
              for line_no, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if pattern.search(line):
                      failures.append(f"{path}:{line_no}: {line}")
          if failures:
              print("Forbidden ambiguous subset notation found. Use \\subseteq, \\subsetneq, or \\Subset.")
              print("\n".join(failures))
              raise SystemExit(1)
          PY

      - name: Build site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
